services:
  mongo1:
    image: mongo:latest
    container_name: mongo1
    entrypoint: >
      bash -c "
        cp /tmp/mongo-keyfile /data/db/mongo-keyfile-internal &&
        chmod 400 /data/db/mongo-keyfile-internal &&
        chown 999:999 /data/db/mongo-keyfile-internal &&
        exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /data/db/mongo-keyfile-internal --bind_ip_all
      "
    restart: unless-stopped
    ports:
      - "27017:27017"  # Exposed to Host
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data1:/data/db
      -  /opt/Workspace/dj-nounoune/docker/keys/mongo-keyfile:/tmp/mongo-keyfile:ro
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate() }" | mongosh --port 27017 --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  mongo2:
    image: mongo:latest
    container_name: mongo2
    entrypoint: >
      bash -c "
        cp /tmp/mongo-keyfile /data/db/mongo-keyfile-internal &&
        chmod 400 /data/db/mongo-keyfile-internal &&
        chown 999:999 /data/db/mongo-keyfile-internal &&
        exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /data/db/mongo-keyfile-internal --bind_ip_all
      "
    restart: unless-stopped
    ports:
      - "27018:27017"  # Exposed to Host
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data2:/data/db
      -  /opt/Workspace/dj-nounoune/docker/keys/mongo-keyfile:/tmp/mongo-keyfile:ro

  mongo-arbiter:
    image: mongo:latest
    container_name: mongo-arbiter
    entrypoint: >
      bash -c "
        cp /tmp/mongo-keyfile /data/db/mongo-keyfile-internal &&
        chmod 400 /data/db/mongo-keyfile-internal &&
        chown 999:999 /data/db/mongo-keyfile-internal &&
        exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /data/db/mongo-keyfile-internal --bind_ip_all
      "
    restart: unless-stopped
    ports:
      - "27019:27017"  # Exposed to Host
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_arbiter_data:/data/db
      -  /opt/Workspace/dj-nounoune/docker/keys/mongo-keyfile:/tmp/mongo-keyfile:ro

  mongo-init:
    image: mongo:latest
    container_name: mongo-init
    restart: "no"
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_started
      mongo-arbiter:
        condition: service_started
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    command: >
      bash -c "
        echo 'Waiting for mongo1 to be ready...'
        sleep 5
        echo 'Initializing Replica Set with Arbiter...'
        mongosh --host mongo1 -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --eval '
          try {
            var status = rs.status();
            if (status.ok === 1) {
              print(\"Replica set already initialized.\");
            } else {
              throw new Error(\"Status not ok\");
            }
          } catch (e) {
            rs.initiate({
              _id: \"rs0\",
              members: [
                { _id: 0, host: \"mongo1:27017\" },
                { _id: 1, host: \"mongo2:27017\" },
                { _id: 2, host: \"mongo-arbiter:27017\", arbiterOnly: true }
              ]
            });
            print(\"Replica set initialized with Arbiter.\");
          }
        '
      "

volumes:
  mongo_data1:
  mongo_data2:
  mongo_arbiter_data: